#nome da pipeline
name: Run Basic Testes - Scheduler

#em que momento será executada
on : 
  schedule:
    - cron: '0 20,22,23 * * 1-5'

# o que sera feito nessa pipeline
jobs:
  cypress-run:
    #maquina que será executado 
    runs-on: ubuntu-latest

    #passo a passo para rodar os testes
    steps: 
        #clone do projeto
      - name: Checkout/Clone do projeto
        uses: actions/checkout@v6

         #exemplo de execucao no terminal 
      - name: Instalar dependencias do projeto
        run: npm install

        #execucao e config do projeto
      - name: Run testes
        uses: cypress-io/github-action@v7
        with: 
          record: true
        env: 
          CYPRESS_RECORD_KEY: ${{ secrets.CYPRESS_RECORD_KEY}}

      #upload relatorio do mocha
      - name: Upload Relatório
        uses: actions/upload-artifact@v7
        with:
          name: Relatório
          path: cypress/reports/html