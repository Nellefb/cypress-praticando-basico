#nome da pipeline
name: Run Basic Testes

#em que momento será executada
on : 
  pull_request: 
    branches: [master]

# o que sera feito nessa pipeline
jobs:
  cypress-run:
    #maquina que será executado 
    runs-on: ubuntu-latest

    #passo a passo para rodar os testes
    steps: 
        #clone do projeto
      - name: Checkout/Clone do projeto
        uses: actions/checkout@v6

        #execucao e config do projeto
      - name: Run testes
        uses: cypress-io/github-action@v7
        with: 
          record: true
        env: 
          CYPRESS_RECORD_KEY: ${{ secrets.CYPRESS_RECORD_KEY}}

        #exemplo de execucao no terminal 
      - name: Instalar dependencias do projeto
        run: echo nala